name: Backend Migrations

on:
  pull_request:
    paths:
      - "backend/sql/**"
      - "backend/scripts/run_sql_migrations.py"
      - ".github/workflows/backend-migrations.yml"
  push:
    branches:
      - main
    paths:
      - "backend/sql/**"
      - "backend/scripts/run_sql_migrations.py"
      - ".github/workflows/backend-migrations.yml"
  workflow_dispatch:

jobs:
  migration-sequence-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zedly
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d zedly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ZEDLY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zedly
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply SQL migrations on clean DB
        run: python backend/scripts/run_sql_migrations.py

      - name: Ensure no pending migrations after apply
        run: python backend/scripts/run_sql_migrations.py --check
