services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env.local or environment}
      POSTGRES_DB: ${POSTGRES_DB:-zedly}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      ZEDLY_STORAGE_BACKEND: postgres
      ZEDLY_SESSIONS_BACKEND: redis
      ZEDLY_DATABASE_URL: ${ZEDLY_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zedly}}
      ZEDLY_REDIS_URL: ${ZEDLY_REDIS_URL:-redis://redis:6379/0}
      ZEDLY_TELEGRAM_BOT_TOKEN: ${ZEDLY_TELEGRAM_BOT_TOKEN:-dev-bot-token}
    ports:
      - "8000:8000"
    command: >
      sh -c "python scripts/run_sql_migrations.py && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
      - api
    environment:
      ZEDLY_STORAGE_BACKEND: postgres
      ZEDLY_SESSIONS_BACKEND: redis
      ZEDLY_DATABASE_URL: ${ZEDLY_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zedly}}
      ZEDLY_REDIS_URL: ${ZEDLY_REDIS_URL:-redis://redis:6379/0}
      ZEDLY_WORKER_POLL_SECONDS: 5
    command: ["python", "worker.py"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
